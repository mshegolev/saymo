name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # required for gh release create

jobs:
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history for changelog excerpt

      - name: Extract changelog section for this tag
        # Tag is taken from GITHUB_REF_NAME via env (not interpolated into shell)
        # to avoid script-injection if a malicious tag name ever lands.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${REF_NAME#v}"
          awk -v tag="$TAG" '
            index($0, "## [" tag "]") == 1 {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." > release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$REF_NAME" \
            --title "$REF_NAME" \
            --notes-file release_notes.md
