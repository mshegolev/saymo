[project]
name = "saymo"
version = "0.1.0"
description = "AI-powered standup automation tool for Glip calls"
requires-python = ">=3.11"

dependencies = [
    "sounddevice>=0.5.0",
    "soundfile>=0.12.0",
    "numpy>=1.26.0",
    "deepgram-sdk>=3.0.0",
    "anthropic>=0.43.0",
    "openai>=1.57.0",
    "jira>=3.8.0",
    "click>=8.1.0",
    "rich>=13.0.0",
    "pynput>=1.7.6",
    "pyyaml>=6.0",
    "aiohttp>=3.9.0",
]

[project.scripts]
saymo = "saymo.cli:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
